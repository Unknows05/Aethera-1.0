<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveMind — Coin Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #040608; color: #64748b; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .pos { color: #10b981; } .neg { color: #f43f5e; }
        .bg-blob-1 { position: fixed; top: -10%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(56, 189, 248, 0.04) 0%, transparent 70%); filter: blur(100px); z-index: 0; pointer-events: none; border-radius: 50%; }
        .bg-blob-2 { position: fixed; bottom: -10%; left: -10%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(139, 92, 246, 0.03) 0%, transparent 70%); filter: blur(120px); z-index: 0; pointer-events: none; border-radius: 50%; }
        .pulse { animation: pulse 2s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.6); animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="relative overflow-x-hidden">
    <div class="bg-blob-1"></div><div class="bg-blob-2"></div>

    <div class="relative z-10 max-w-5xl mx-auto p-4 md:p-8 pb-24">
        <header class="text-center py-10">
            <h1 class="text-5xl font-black text-white tracking-tighter">HiveMind</h1>
            <p class="text-sm text-slate-600 mt-2">Swarm Intelligence — Crowd-Tested Trading Wisdom</p>
            <div class="flex gap-4 justify-center mt-4">
                <a href="/" class="text-xs text-slate-500 hover:text-white transition-colors">← Screener</a>
                <a href="/account" class="text-xs text-slate-500 hover:text-white transition-colors">← Account</a>
            </div>
        </header>

        <div class="flex items-center justify-center gap-2 mb-8">
            <span class="live-dot"></span>
            <span class="text-xs text-emerald-400 font-bold tracking-widest uppercase">Live Swarm</span>
            <span class="text-[10px] text-slate-600" id="swarm-updated">—</span>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-2xl p-5 text-center"><div class="text-[10px] text-slate-600 uppercase font-bold tracking-widest mb-2">Agents</div><div class="text-3xl font-black text-white" id="stat-agents">—</div></div>
            <div class="glass rounded-2xl p-5 text-center"><div class="text-[10px] text-slate-600 uppercase font-bold tracking-widest mb-2">Lessons</div><div class="text-3xl font-black text-violet-400" id="stat-lessons">—</div></div>
            <div class="glass rounded-2xl p-5 text-center"><div class="text-[10px] text-slate-600 uppercase font-bold tracking-widest mb-2">Trades</div><div class="text-3xl font-black text-amber-400" id="stat-trades">—</div></div>
            <div class="glass rounded-2xl p-5 text-center"><div class="text-[10px] text-slate-600 uppercase font-bold tracking-widest mb-2">Crowd WR</div><div class="text-3xl font-black text-emerald-400" id="stat-wr">—%</div></div>
        </div>

        <!-- Thresholds -->
        <div class="glass rounded-2xl px-6 py-4 mb-8 flex items-center justify-between">
            <span class="text-[10px] text-slate-600 uppercase font-bold tracking-widest">Crowd Thresholds</span>
            <div class="flex gap-6 text-xs text-white font-mono">
                <span>LONG ≥ <span class="text-emerald-400 font-bold" id="th-long">56</span></span>
                <span>SHORT ≤ <span class="text-rose-400 font-bold" id="th-short">44</span></span>
                <span>Floor: <span class="text-amber-400 font-bold" id="th-floor">35</span></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Top Combos -->
            <section class="glass rounded-[2rem] p-6">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider mb-4">Top Regime Combos</h3>
                <div id="combos-list" class="space-y-2">
                    <div class="text-xs text-slate-500 py-4 text-center">Loading swarm data...</div>
                </div>
            </section>

            <!-- Live Feed -->
            <section class="glass rounded-[2rem] p-6">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider mb-4">Live Decision Feed</h3>
                <div id="feed-list" class="space-y-2">
                    <div class="text-xs text-slate-500 py-4 text-center">Loading...</div>
                </div>
            </section>
        </div>

        <!-- Crowd Lessons -->
        <section class="glass rounded-[2rem] p-6">
            <h3 class="text-sm font-bold text-white uppercase tracking-wider mb-4">Crowd Lessons</h3>
            <div id="lessons-feed" class="space-y-2">
                <div class="text-xs text-slate-500 py-4 text-center">Loading crowd wisdom...</div>
            </div>
        </section>
    </div>

<script>
async function apiFetch(path) {
    try { const r = await fetch('/api' + path); return r.json().catch(() => ({})); }
    catch (e) { return {}; }
}

async function loadSwarm() {
    const r = await apiFetch('/hivemind/stats');
    if (!r.ok || !r.stats) return setTimeout(loadSwarm, 5000);
    const s = r.stats;

    document.getElementById('stat-agents').textContent = s.agents || 0;
    document.getElementById('stat-lessons').textContent = s.lessons || 0;
    document.getElementById('stat-trades').textContent = s.trades || 0;
    document.getElementById('stat-wr').textContent = (s.crowd_wr || 0).toFixed(1) + '%';
    document.getElementById('swarm-updated').textContent = new Date().toLocaleTimeString();

    // Combos
    const combos = s.top_combos || [];
    document.getElementById('combos-list').innerHTML = combos.length ? combos.map(c => {
        const cls = c.wr >= 55 ? 'text-emerald-400' : c.wr >= 45 ? 'text-amber-400' : 'text-rose-400';
        const bar = '█'.repeat(Math.round(c.wr/5)) + '░'.repeat(20 - Math.round(c.wr/5));
        return `<div class="glass rounded-xl p-3 flex justify-between items-center text-xs">
            <span class="text-white font-medium">${c.regime}+${c.signal}</span>
            <span class="${cls} font-mono">${c.wr}%</span>
            <span class="text-slate-500">${c.trades} trades</span>
            <span class="text-slate-600 font-mono text-[10px]">${bar}</span>
        </div>`;
    }).join('') : '<div class="text-xs text-slate-500 py-4 text-center">No data yet</div>';

    // Feed
    const feed = s.feed || [];
    document.getElementById('feed-list').innerHTML = feed.length ? feed.map(f => {
        const cls = f.result === 'WIN' ? 'pos' : 'neg';
        const pnl = f.pnl_pct ? `${f.pnl_pct > 0 ? '+' : ''}${f.pnl_pct.toFixed(1)}%` : '';
        return `<div class="glass rounded-xl p-3 text-xs flex justify-between">
            <div><span class="text-slate-500">${(f.timestamp||'').slice(11,19)}</span> <span class="text-white font-bold">${f.symbol}</span> <span class="${f.signal==='LONG'?'text-emerald-400':'text-rose-400'}">${f.signal}</span></div>
            <div class="${cls} font-mono">${pnl}</div>
            <div class="text-slate-500 truncate max-w-[200px]">${f.text || ''}</div>
        </div>`;
    }).join('') : '<div class="text-xs text-slate-500 py-4 text-center">No swarm activity yet</div>';

    // Lessons
    const lessons = s.crowd_lessons || [];
    document.getElementById('lessons-feed').innerHTML = lessons.length ? lessons.map(l =>
        `<div class="glass rounded-xl p-3 text-xs"><span class="text-violet-400 font-bold">✦</span> <span class="text-slate-300">${l}</span></div>`
    ).join('') : '<div class="text-xs text-slate-500 py-4 text-center">No crowd lessons yet. Start trading to contribute.</div>';

    setTimeout(loadSwarm, 15000);
}

loadSwarm();
</script>
</body>
</html>
